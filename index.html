<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memories</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Lora:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Nebula background layers -->
    <div class="nebula nebula-1"></div>
    <div class="nebula nebula-2"></div>
    <div class="nebula nebula-3"></div>

    <!-- Star field canvas -->
    <canvas id="star-canvas"></canvas>

    <!-- Fireworks canvas (final scene) -->
    <canvas id="fireworks-canvas"></canvas>

    <!-- Cursor glow -->
    <div class="cursor-glow" id="cursor-glow"></div>

    <!-- Effects container -->
    <div id="effects-container"></div>

    <!-- LOADING SCREEN -->
    <div id="loading-screen" class="screen active">
        <div class="loading-stars" id="loading-stars"></div>
        <div class="loading-text">Loading Our Universe...</div>
        <div class="loading-bar">
            <div class="loading-bar-fill" id="loading-bar-fill"></div>
        </div>
    </div>

    <!-- HOME SCREEN -->
    <div id="home-screen" class="screen">
        <h1 class="home-title">Our Galaxy of Memories</h1>
        <p class="home-subtitle">Every star hides a memory of us.<br>Find them all.</p>
        <div class="stars-grid" id="stars-grid"></div>
        <div class="progress-text">Memories Unlocked <span id="progress-count">0</span>/6</div>
    </div>

    <!-- PUZZLE SCREEN -->
    <div id="puzzle-screen" class="screen">
        <div class="puzzle-wrapper glass-card">
            <button class="puzzle-back" id="puzzle-back" aria-label="Go back"><i class="fas fa-arrow-left"></i></button>
            <h2 class="puzzle-title" id="puzzle-title"></h2>
            <p class="puzzle-instruction" id="puzzle-instruction"></p>
            <div class="puzzle-area" id="puzzle-area"></div>
        </div>
    </div>

    <!-- REVEAL SCREEN -->
    <div id="reveal-screen" class="screen">
        <div class="reveal-container glass-card">
            <div class="reveal-photo-wrap" id="reveal-photo-wrap">
                <img id="reveal-photo" src="" alt="Memory photo">
            </div>
            <div class="reveal-text" id="reveal-text"></div>
            <button class="btn" id="reveal-next-btn">Continue <i class="fas fa-arrow-right"></i></button>
        </div>
    </div>

    <!-- FINAL SCREEN -->
    <div id="final-screen" class="screen">
        <svg class="final-heart" id="final-heart" viewBox="0 0 100 100" fill="none">
            <path d="M50 88C25 65 5 50 5 30C5 15 17 5 30 5C38 5 45 9 50 16C55 9 62 5 70 5C83 5 95 15 95 30C95 50 75 65 50 88Z" fill="url(#heartGrad)" stroke="rgba(255,107,157,0.4)" stroke-width="1"/>
            <defs>
                <linearGradient id="heartGrad" x1="0" y1="0" x2="100" y2="100">
                    <stop offset="0%" stop-color="#ff6b9d"/>
                    <stop offset="100%" stop-color="#ff3366"/>
                </linearGradient>
            </defs>
        </svg>
        <div class="final-text" id="final-text"></div>
        <button class="btn btn-glow" id="restart-btn">Restart Our Journey <i class="fas fa-redo"></i></button>
    </div>

    <script src="script.js"></script>
</body>
</html>
