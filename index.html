<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="Our Galaxy of Memories - An interactive romantic experience">
    <title>Memories — Our Galaxy</title>

    <!-- Fonts: Playfair Display (headings) + Cormorant Garamond (body) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&display=swap" rel="stylesheet">

    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <!-- Main Stylesheet -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- ===== GALAXY BACKGROUND LAYERS ===== -->
    <div class="nebula nebula-1" aria-hidden="true"></div>
    <div class="nebula nebula-2" aria-hidden="true"></div>
    <div class="nebula nebula-3" aria-hidden="true"></div>
    <canvas id="star-canvas" class="star-canvas" aria-hidden="true"></canvas>

    <!-- ===== LOADING SCREEN ===== -->
    <section id="loading-screen" class="screen active" role="status" aria-label="Loading">
        <div id="loading-stars" class="loading-stars" aria-hidden="true"></div>
        <p class="loading-title">Loading Our Universe...</p>
        <div class="loading-bar-track">
            <div id="loading-bar-fill" class="loading-bar-fill"></div>
        </div>
        <div id="loading-tap" class="loading-tap" role="button" tabindex="0" aria-label="Enter site">
            ✨ Tap to Enter Our Galaxy ✨
        </div>
    </section>

    <!-- ===== HOME SCREEN ===== -->
    <section id="home-screen" class="screen" role="main">
        <div class="home-content">
            <h1 class="home-title">✨ Our Galaxy of Memories ✨</h1>
            <p class="home-subtitle">Every star hides a memory of us.<br>Find them all.</p>
            <div id="stars-grid" class="stars-grid" role="group" aria-label="Memory stars"></div>
            <p class="home-progress">Memories Unlocked: <span id="progress-count">0</span>/6</p>
        </div>
    </section>

    <!-- ===== PUZZLE SCREEN ===== -->
    <section id="puzzle-screen" class="screen" role="region" aria-label="Puzzle challenge">
        <header class="puzzle-header glass">
            <button id="puzzle-back" class="puzzle-back-btn" aria-label="Go back to home">
                <i class="fas fa-arrow-left"></i> Back
            </button>
            <h2 id="puzzle-title" class="puzzle-title-text"></h2>
            <p id="puzzle-instruction" class="puzzle-instruction-text"></p>
        </header>
        <div id="puzzle-area" class="puzzle-area"></div>
    </section>

    <!-- ===== REVEAL SCREEN ===== -->
    <section id="reveal-screen" class="screen" role="region" aria-label="Memory reveal">
        <div class="reveal-content">
            <div id="reveal-photo-wrap" class="reveal-photo-wrap">
                <img id="reveal-photo" class="reveal-photo" alt="Our memory" loading="eager">
            </div>
            <div id="reveal-text" class="reveal-text" aria-live="polite"></div>
            <button id="reveal-next-btn" class="reveal-next-btn">Continue <i class="fas fa-arrow-right"></i></button>
        </div>
    </section>

    <!-- ===== FINAL SCREEN ===== -->
    <section id="final-screen" class="screen" role="region" aria-label="Final message">
        <div class="final-content">
            <div id="final-heart" class="final-heart" aria-hidden="true">❤️</div>
            <div id="final-text" class="final-text" aria-live="polite"></div>
            <button id="restart-btn" class="restart-btn">❤️ Restart Our Journey ❤️</button>
        </div>
    </section>

    <!-- ===== OVERLAYS & EFFECTS ===== -->
    <div id="effects-container" class="effects-container" aria-hidden="true"></div>
    <canvas id="fireworks-canvas" class="fireworks-canvas" aria-hidden="true"></canvas>
    <div id="cursor-glow" class="cursor-glow" aria-hidden="true"></div>

    <!-- Music Toggle Button -->
    <button id="music-btn" class="music-btn" aria-label="Toggle background music">
        <i id="music-icon" class="fas fa-volume-xmark"></i>
    </button>

    <!-- Main Script -->
    <script src="script.js"></script>
</body>
</html>
